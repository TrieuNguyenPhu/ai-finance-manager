# Local development dependencies only. No application services or AWS resources.
name: ai-finance-manager

services:
  postgres:
    image: postgres:16-alpine
    container_name: afm-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afm_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-afm}
    volumes:
      - afm_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: afm-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:4
    container_name: afm-localstack
    restart: unless-stopped
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: ${AWS_REGION:-ap-southeast-1}
      DEBUG: "0"
    volumes:
      - ./docker/localstack/init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q 'sqs' "]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  afm_postgres_data:
