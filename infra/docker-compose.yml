# Local development dependencies only. No application services or AWS resources.
name: ai-finance-manager

services:
  postgres:
    image: postgres:16-alpine
    container_name: afm-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afm_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-afm}
    volumes:
      - afm_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  afm_postgres_data:
