spring.datasource.url=jdbc:h2:mem:id;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS IDENTITY
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=IDENTITY
spring.flyway.enabled=true
spring.flyway.schemas=IDENTITY
spring.flyway.default-schema=IDENTITY
spring.flyway.create-schemas=true
