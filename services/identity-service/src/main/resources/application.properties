server.port=8080
spring.application.name=identity-service

spring.datasource.url=${IDENTITY_DB_URL:jdbc:postgresql://127.0.0.1:5432/afm}
spring.datasource.username=${IDENTITY_DB_USER:identity_app}
spring.datasource.password=${IDENTITY_DB_PASSWORD:identity_local}
spring.datasource.hikari.schema=identity
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=identity
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.schemas=identity
spring.flyway.default-schema=identity
spring.flyway.create-schemas=true
