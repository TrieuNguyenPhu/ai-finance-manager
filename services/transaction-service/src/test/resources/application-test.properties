spring.datasource.url=jdbc:h2:mem:tx;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS TRANSACTION
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=TRANSACTION
spring.flyway.enabled=true
spring.flyway.schemas=TRANSACTION
spring.flyway.default-schema=TRANSACTION
spring.flyway.create-schemas=true

afm.outbox.relay-enabled=false
