server.port=8081
spring.application.name=transaction-service

spring.datasource.url=${TRANSACTION_DB_URL:jdbc:postgresql://127.0.0.1:5432/afm}
spring.datasource.username=${TRANSACTION_DB_USER:transaction_app}
spring.datasource.password=${TRANSACTION_DB_PASSWORD:transaction_local}
spring.datasource.hikari.schema=transaction
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=transaction
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.schemas=transaction
spring.flyway.default-schema=transaction
spring.flyway.create-schemas=true

afm.outbox.relay-enabled=${OUTBOX_RELAY_ENABLED:true}
afm.outbox.transport=${OUTBOX_TRANSPORT:http}
afm.outbox.analytics-url=${ANALYTICS_BASE_URL:http://127.0.0.1:8083}
afm.outbox.budget-url=${BUDGET_BASE_URL:http://127.0.0.1:8082}
afm.outbox.notification-url=${NOTIFICATION_BASE_URL:http://127.0.0.1:8084}
afm.outbox.poll-ms=${OUTBOX_POLL_MS:2000}
afm.outbox.batch-size=${OUTBOX_BATCH_SIZE:100}
afm.outbox.internal-token=${INTERNAL_EVENTS_TOKEN:local-internal-events-token}
afm.outbox.aws-region=${AWS_REGION:ap-southeast-1}
afm.outbox.endpoint-url=${SQS_ENDPOINT_URL:}
afm.outbox.access-key=${AWS_ACCESS_KEY_ID:local}
afm.outbox.secret-key=${AWS_SECRET_ACCESS_KEY:local}
afm.outbox.budget-queue-url=${BUDGET_QUEUE_URL:http://127.0.0.1:4566/000000000000/budget-events}
afm.outbox.analytics-queue-url=${ANALYTICS_QUEUE_URL:http://127.0.0.1:4566/000000000000/analytics-events}
afm.outbox.notification-queue-url=${NOTIFICATION_QUEUE_URL:http://127.0.0.1:4566/000000000000/notification-events}
