{
  "openapi": "3.0.3",
  "info": {
    "title": "ai-finance-manager gateway API",
    "version": "0.1.0",
    "description": "Browser-facing BFF contract. Money fields use integer minor units."
  },
  "paths": {
    "/health": {
      "get": {
        "summary": "Liveness",
        "responses": {
          "200": {
            "description": "OK"
          }
        }
      }
    },
    "/api/v1/accounts": {
      "get": {
        "summary": "List accounts",
        "parameters": [{ "name": "limit", "in": "query", "schema": { "type": "integer", "minimum": 1, "maximum": 100, "default": 50 } }]
      },
      "post": { "summary": "Create account" }
    },
    "/api/v1/transactions": {
      "get": {
        "summary": "List ledger entries",
        "parameters": [{ "name": "limit", "in": "query", "schema": { "type": "integer", "minimum": 1, "maximum": 100, "default": 50 } }]
      },
      "post": {
        "summary": "Create ledger entry",
        "parameters": [
          {
            "name": "Idempotency-Key",
            "in": "header",
            "required": true,
            "schema": { "type": "string" }
          }
        ]
      }
    },
    "/api/v1/ai/drafts": {
      "post": {
        "summary": "Create AI draft (confirm-before-save; never posts ledger)"
      }
    }
  }
}
